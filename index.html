<!DOCTYPE html>
<!--
  CrossMeowdiabar — an XMB-style launcher for Scratch / TurboWarp / SB3 projects.

  HOW TO USE THIS FILE
  - Save this as index.html in a GitHub repo, turn on GitHub Pages (Settings
    -> Pages -> Deploy from branch), and this becomes your site.
  - Unlike the old version, you no longer edit code to add content:
      Settings  -> toggle launch animation, instant launch, theme, music, and
                   TurboWarp performance extras
      SB3       -> upload .sb3 files from your computer and run them in-page
      Link      -> paste a scratch.mit.edu or turbowarp.org link to add it
  - Section 1 (THEME) is still the only part you need to touch to change
    spacing/sizing. Colors now come from the THEMES list in Section 2 so you
    can add your own named palettes instead of just light/dark.
  - Section 2 (CONTENT) is also where you register custom icons, fonts,
    background music, and UI sound effects — see the ICONS / FONTS /
    THEMES / MUSIC_TRACKS / UI_SOUNDS blocks below.
  - Section 3 (ENGINE) is the navigation + runtime logic. You shouldn't need
    to edit it, but it's commented so you can find your way around.
  - While the SB3 player is open, the launcher's own arrow-key/Enter
    navigation is disabled so keyboard input goes to the running project
    instead. Escape always closes whichever panel is open.

  ADDING YOUR OWN GRAPHICS
  - Any `icon` field (in ICONS below, or in a category/item) accepts either
    an emoji or a snippet of HTML, so you can drop in your own artwork:
      icon: '<img src="icons/my-icon.png" style="width:100%;height:100%">'
    Put the image file in an "icons/" folder next to this page.

  ADDING YOUR OWN FONT (.ttf)
  - Put your .ttf file in a "fonts/" folder next to this page, then fill in
    the @font-face block near the top of the THEME section (search for
    "FONTS —") and reference your font's name in --font.

  ASSETS FOLDER (background + sounds)
  - This page expects an "assets/" folder next to it in your repo with:
      assets/bg.mp4       — default animated background (looping, muted)
      assets/mus.mp3       — default background music track
      assets/sel.mp3        — select / confirm sound effect
      assets/ScrollL.mp3    — scroll sound when moving left / up
      assets/ScrollR.mp3    — scroll sound when moving right / down
    If a file is missing, that piece just falls back silently (default bg
    video won't show, music/sfx fall back to synthesized tones).
  - Settings -> Background lets a visitor swap the default bg.mp4 for their
    own background at runtime: a static PNG/JPG, or an animated MP4/GIF
    (capped at 30 seconds — longer MPDs are rejected client-side; GIF
    length can't be reliably measured in-browser, so keep those short).
    Uploaded backgrounds are stored in localStorage so they persist on
    reload, the same way uploaded SB3 projects do (see the note below).

  A NOTE ON PERSISTENCE
  - Settings, saved links, uploaded SB3 projects, and any custom background
    uploaded via Settings are saved to your browser's localStorage, so they
    survive a page reload once this is hosted on your own site. Inside the
    Claude.ai chat preview, localStorage is sandboxed and writes may
    silently fail — that's expected here and isn't a bug; it'll work
    normally once deployed to GitHub Pages. Large uploads (long videos,
    big images) count against the browser's localStorage quota (usually a
    few MB), so keep custom backgrounds modest in file size.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CrossMeowdiabar</title>
<style>
  /* ======================================================================
     1) THEME — edit these to re-skin the whole page. Nothing past this
        block needs to change for a simple graphics/color update.
     ====================================================================== */
  :root{
    --bg-deep:  #04101f;   /* darkest background navy (dark theme) */
    --bg-mid:   #0a2947;   /* mid-tone background navy (dark theme) */
    --ink:      #eaf6ff;   /* primary text / active icon glyph color */
    --ink-dim:  #52708c;   /* unselected icons, labels, hint text */
    --panel:    rgba(255,255,255,0.06); /* faint highlight fill */
    --accent:   #4fd8ff;   /* fallback glow color before JS sets one */

    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;

    --icon-size:        clamp(48px, 8vw, 72px);
    --icon-size-active: clamp(64px, 10vw, 100px);
    --category-gap:     clamp(28px, 6vw, 64px);

    --transition-fast: .22s ease;
    --transition-med:  .4s cubic-bezier(.22,.9,.32,1);
  }

  /* ----- FONTS — drop a .ttf into a "fonts/" folder next to this page and
     uncomment/edit this block, then add the family name to --font above,
     e.g. --font: 'MyFont', -apple-system, ...; ----- */
  /*
  @font-face{
    font-family: 'MyFont';
    src: url('fonts/MyFont.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  */

  /* ----- theme colors (--bg-deep, --bg-mid, --ink, --ink-dim, --panel) are
     applied at runtime from the THEMES list in the CONTENT section below,
     so any number of named themes can be defined there instead of a fixed
     light/dark pair. ----- */

  @media (prefers-reduced-motion: reduce){
    :root{ --transition-fast: 0s; --transition-med: 0s; }
    .wave-bg::before, .wave-bg::after{ animation: none; }
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    height: 100%;
    background: #000; /* plain fallback only for the split-second before bg-media paints — no gradient competing with the asset */
    color: var(--ink);
    font-family: var(--font);
    overflow: hidden;
    transition: background var(--transition-med), color var(--transition-med);
  }

  /* ----- background media: assets/bg.mp4 by default, or a user-uploaded
     static image / animated mp4 / gif from Settings -> Background. Sits
     behind the .wave-bg color tint and all page content. ----- */
  .bg-media{
    position: fixed;
    inset: 0;
    z-index: 0; /* was -1: negative z-index on a fixed element paints BEHIND the page's own canvas background in most browsers, so the video/image was always invisible regardless of gradient. 0 sits above the plain body fallback; .chrome/.stage/.launch-flash/modals all use higher z-index so they still layer on top. */
    overflow: hidden;
    background: #000; /* fallback while the video/image element loads */
  }
  .bg-media video,
  .bg-media img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  /* ----- ambient wave background — TEMPORARILY DISABLED for background
     troubleshooting; see note near <div class="wave-bg"> below ----- */

  /* ----- top chrome: title + clock, like the XMB corner readouts ----- */
  .chrome{
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px clamp(20px, 4vw, 48px);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-dim);
    z-index: 2;
  }
  .chrome .title{
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    font-weight: 600;
  }

  /* ----- main stage ----- */
  .stage{
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .category-viewport{
    width: 100%;
    overflow: hidden;
    padding: 10px 0;
  }
  .category-row{
    display: flex;
    align-items: flex-end;
    gap: var(--category-gap);
    width: max-content;
    padding: 0 50vw; /* slack so the first/last icon can still reach center */
    transition: transform var(--transition-med);
    will-change: transform;
  }

  .category{
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: .38;
    transform: scale(.82);
    transition: opacity var(--transition-fast), transform var(--transition-fast);
    cursor: pointer;
  }
  .category .icon{
    width: var(--icon-size);
    height: var(--icon-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--icon-size) * 0.5);
    border-radius: 18px;
    background: var(--panel);
    transition: all var(--transition-fast);
  }
  .category .label{
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
    opacity: 0;
    white-space: nowrap;
    transition: opacity var(--transition-fast);
  }
  .category.active{
    opacity: 1;
    transform: scale(1);
  }
  .category.active .icon{
    width: var(--icon-size-active);
    height: var(--icon-size-active);
    font-size: calc(var(--icon-size-active) * 0.5);
    background: var(--category-color, var(--accent));
    box-shadow: 0 0 18px 4px var(--category-glow, rgba(79,216,255,.6));
    color: #041018;
  }
  .category.active .label{
    opacity: 1;
    color: var(--ink);
  }
  .category:focus-visible{
    outline: 2px solid var(--ink);
    outline-offset: 4px;
  }

  /* ----- vertical item list under the active category ----- */
  .item-list{
    margin-top: clamp(28px, 5vh, 56px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: min(90vw, 380px);
    max-height: 40vh;
    overflow: hidden auto;
  }
  .item{
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    border-left: 4px solid transparent;
    background: none;
    font: inherit;
    color: var(--ink-dim);
    text-decoration: none;
    text-align: left;
    opacity: .55;
    transform: translateX(-6px) scale(.97);
    transition: all var(--transition-fast);
    cursor: pointer;
  }
  .item .item-icon{ font-size: 18px; width: 22px; text-align: center; }
  .item .item-label{ font-size: 15px; letter-spacing: .2px; }
  .item.active{
    opacity: 1;
    color: var(--ink);
    background: var(--panel);
    border-left-color: var(--category-color, var(--accent));
    transform: translateX(0) scale(1.03);
  }
  .item:hover{ opacity: 1; }
  .item:focus-visible{
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }
  /* ----- launch bounce: brief pop on the highlighted item right before the
     launch-flash fade, only when Instant Launch is Off. See
     withLaunchAnimation() in the ENGINE section. ----- */
  @keyframes launch-bounce{
    0%   { transform: translateX(0) scale(1.03); }
    35%  { transform: translateX(0) scale(1.16); }
    70%  { transform: translateX(0) scale(0.97); }
    100% { transform: translateX(0) scale(1.03); }
  }
  .item.launch-bounce{
    animation: launch-bounce .18s ease;
  }
  .item-empty{
    padding: 10px 18px;
    font-size: 13px;
    color: var(--ink-dim);
    opacity: .6;
    font-style: italic;
  }

  .hint{
    position: fixed;
    bottom: 26px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
    z-index: 2;
  }
  .hint kbd{
    font-family: inherit;
    border: 1px solid var(--ink-dim);
    border-radius: 4px;
    padding: 1px 6px;
    margin: 0 2px;
  }

  /* ----- launch flash: brief tinted transition before something opens ----- */
  .launch-flash{
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--category-color, var(--accent));
    opacity: 0;
    transform: scale(1.4);
    pointer-events: none;
    transition: opacity .18s ease, transform .28s cubic-bezier(.22,.9,.32,1);
  }
  .launch-flash.active{
    opacity: .85;
    transform: scale(1);
  }

  /* ----- modal shell shared by the "add link" panel and the SB3 player ----- */
  .modal-backdrop{
    position: fixed;
    inset: 0;
    z-index: 60;
    background: rgba(2,8,16,.6);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-backdrop.open{ display: flex; }

  .add-link-panel{
    width: min(92vw, 420px);
    background: var(--bg-mid);
    border: 1px solid var(--panel);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .add-link-panel h2{
    margin: 0 0 6px;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
  }
  .add-link-panel p{
    margin: 0 0 16px;
    font-size: 13px;
    color: var(--ink-dim);
  }
  .add-link-panel input{
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--panel);
    background: var(--panel);
    color: var(--ink);
    font: inherit;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .add-link-panel input:focus{
    outline: 2px solid var(--category-color, var(--accent));
  }
  .panel-error{
    font-size: 12px;
    color: #ff8a8a;
    min-height: 16px;
    margin-bottom: 8px;
  }
  .panel-actions{
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 6px;
  }
  .panel-actions button{
    font: inherit;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }
  .panel-actions .btn-cancel{
    background: transparent;
    color: var(--ink-dim);
  }
  .panel-actions .btn-confirm{
    background: var(--category-color, var(--accent));
    color: #041018;
    font-weight: 600;
  }

  .player-shell{
    width: min(94vw, 560px);
    background: var(--bg-mid);
    border: 1px solid var(--panel);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .player-bar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--ink);
  }
  .player-controls button{
    font: inherit;
    font-size: 14px;
    margin-left: 8px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
  }
  .player-controls button:hover{ background: var(--category-color, var(--accent)); color: #041018; }
  .player-canvas-wrap{
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #playerStage{
    width: 480px;
    height: 360px;
    max-width: 100%;
  }
  .player-status{
    padding: 8px 16px 14px;
    font-size: 12px;
    color: var(--ink-dim);
  }

  /* ----- fullscreen SB3 player: shell fills the screen, stage grows to fit ----- */
  .player-shell:fullscreen,
  .player-shell:-webkit-full-screen{
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #000;
    border-radius: 0;
  }
  .player-shell:fullscreen .player-canvas-wrap,
  .player-shell:-webkit-full-screen .player-canvas-wrap{
    flex: 1;
    min-height: 0;
  }
  .player-shell:fullscreen #playerStage,
  .player-shell:-webkit-full-screen #playerStage{
    width: 100%;
    height: 100%;
  }

  @media (max-width: 520px){
    .chrome{ font-size: 11px; letter-spacing: 2px; }
    .hint{ display: none; } /* touch users just tap */
  }
</style>
</head>
<body>

  <!-- background media: default assets/bg.mp4, or a user-uploaded static
       image / animated mp4 / gif (Settings -> Background) -->
  <div class="bg-media" id="bgMedia">
    <video id="bgVideo" autoplay loop muted playsinline></video>
    <img id="bgImage" alt="" />
  </div>

  <!-- wave-bg glow layer TEMPORARILY REMOVED to troubleshoot bg.mp4 visibility —
       see the note in the CSS above for how to restore it -->
  <div class="launch-flash" id="launchFlash"></div>

  <div class="chrome">
    <span class="title">🐾 <span id="siteTitle"></span></span>
    <span id="clock"></span>
  </div>

  <main class="stage">
    <div class="category-viewport">
      <div class="category-row" id="categoryRow"></div>
    </div>
    <div class="item-list" id="itemList"></div>
  </main>

  <div class="hint">
    <kbd>&larr;</kbd><kbd>&rarr;</kbd> categories &nbsp; <kbd>&uarr;</kbd><kbd>&darr;</kbd> items &nbsp; <kbd>Enter</kbd> select &nbsp; · &nbsp; or just click / tap
  </div>

  <!-- hidden native file picker used by the SB3 "upload" item -->
  <input type="file" id="sb3FileInput" accept=".sb3" hidden />

  <!-- hidden native file pickers used by the Settings -> Background items -->
  <input type="file" id="bgImageInput" accept="image/png,image/jpeg" hidden />
  <input type="file" id="bgAnimInput" accept="video/mp4,image/gif,.mp4,.gif" hidden />

  <!-- background music, sourced from MUSIC_TRACKS below (silent until you add a track) -->
  <audio id="bgMusic" loop></audio>

  <!-- "add link" modal -->
  <div class="modal-backdrop" id="addLinkBackdrop">
    <div class="add-link-panel">
      <h2>Add a link</h2>
      <p>Paste a scratch.mit.edu or turbowarp.org project link.</p>
      <input type="text" id="addLinkInput" placeholder="https://turbowarp.org/000000000" />
      <div class="panel-error" id="addLinkError"></div>
      <div class="panel-actions">
        <button class="btn-cancel" id="addLinkCancel">Cancel</button>
        <button class="btn-confirm" id="addLinkConfirm">Add</button>
      </div>
    </div>
  </div>

  <!-- SB3 player modal -->
  <div class="modal-backdrop" id="playerBackdrop">
    <div class="player-shell" id="playerShell">
      <div class="player-bar">
        <span id="playerTitle">Project</span>
        <div class="player-controls">
          <button id="playerGreenFlag" title="Green flag">▶</button>
          <button id="playerStop" title="Stop">■</button>
          <button id="playerFullscreen" title="Fullscreen">⛶</button>
          <button id="playerClose" title="Close">✕</button>
        </div>
      </div>
      <div class="player-canvas-wrap">
        <div id="playerStage"></div>
      </div>
      <div class="player-status" id="playerStatus">Loading…</div>
    </div>
  </div>

  <!-- @turbowarp/scaffolding powers the in-page SB3 runtime — a single
       self-contained bundle built exactly for standalone project players
       (it's what the real TurboWarp Packager uses under the hood) -->
  <script src="https://cdn.jsdelivr.net/npm/@turbowarp/scaffolding@0.2.0/dist/scaffolding-min.js"></script>

<script>
/* ========================================================================
   2) CONTENT & STATE
      - ICONS / THEMES / MUSIC_TRACKS / UI_SOUNDS are the config points for
        your own graphics, color palettes, background music, and sound
        effects. Edit those freely.
      - settingsState / sb3Projects / userLinks are live app data, normally
        managed through the UI (and persisted to localStorage) rather than
        edited by hand.
   ======================================================================== */
  const SITE_TITLE = 'CrossMeowdiabar';

  // ---- ICONS ----------------------------------------------------------------
  // Each value is emoji by default, but accepts any HTML snippet, so you can
  // swap in your own artwork: '<img src="icons/settings.png" style="width:100%;height:100%">'
  const ICONS = {
    category:    { settings: '⚙️', sb3: '🐾', link: '🔗' },
    upload:      '📥',
    addLink:     '➕',
    toggleOn:    '✅',
    toggleOff:   '⬜',
    linkScratch: '🐱',
    linkTurbowarp: '⚡',
    sb3Project:  '🐾',
    fast:        '🚀',
    slow:        '🐢',
    themeIcon:   '🎨',
    musicIcon:   '🎵',
    bgIcon:      '🖼️'
  };

  // ---- THEMES -----------------------------------------------------------------
  // Add as many named palettes as you like — the Settings "Theme" item
  // cycles through this list in order. Each needs the same five keys.
  const THEMES = [
    { id: 'dark',  label: 'Dark',  bgDeep: '#04101f', bgMid: '#0a2947', ink: '#eaf6ff', inkDim: '#52708c', panel: 'rgba(255,255,255,0.06)' },
    { id: 'light', label: 'Light', bgDeep: '#dce6f0', bgMid: '#f7fbff', ink: '#10202f', inkDim: '#6b7c8c', panel: 'rgba(10,30,50,0.06)' }
    // Example custom theme — copy this pattern to add your own:
    // { id: 'sunset', label: 'Sunset', bgDeep: '#1a0510', bgMid: '#3a0f24', ink: '#ffe9d6', inkDim: '#b98a86', panel: 'rgba(255,255,255,0.08)' }
  ];

  // ---- MUSIC ------------------------------------------------------------------
  // Point these at audio files (mp3/ogg) to enable background music. Drop
  // files into an "assets/" folder next to this page. Leave the list empty
  // to hide the music setting entirely.
  const MUSIC_TRACKS = [
    { id: 'mus', label: 'Theme', url: 'assets/mus.mp3' }
  ];

  // ---- UI SOUNDS ----------------------------------------------------------------
  // Scroll/select sounds fall back to synthesized tones if a file is
  // missing or fails to load. These point at assets/ next to this page:
  //   ScrollL.mp3 — moving left / up   ScrollR.mp3 — moving right / down
  //   sel.mp3     — confirming / selecting an item
  const UI_SOUNDS = {
    scrollLeft:  'assets/ScrollL.mp3',
    scrollRight: 'assets/ScrollR.mp3',
    select:      'assets/sel.mp3'
  };

  // ---- BACKGROUND ---------------------------------------------------------------
  // Default animated background video, looped and muted. Visitors can swap
  // this out at runtime from Settings -> Background with their own static
  // image (png/jpg) or animated background (mp4/gif, capped at this many
  // seconds for mp4 — gif length can't be reliably checked in-browser).
  const DEFAULT_BG_VIDEO = 'assets/bg.mp4';
  const MAX_ANIMATED_BG_SECONDS = 30;

  const settingsState = {
    // Single toggle: Off = bounce the highlighted button + fade the screen
    // before launching (on select). On = skip the animation and start the
    // content immediately (on select). Never triggers on mere navigation.
    instantLaunch: false,
    theme: THEMES[0].id,
    musicEnabled: true,
    musicTrackIndex: 0,
    background: {
      mode: 'default',     // 'default' | 'image' | 'animated'
      imageData: null,     // data URL for an uploaded png/jpg
      animData: null,      // data URL for an uploaded mp4/gif
      animMime: null        // 'video/mp4' | 'image/gif' — which the data URL is
    },
    // TurboWarp-style runtime extras, applied to the SB3 player:
    framerate: 30,        // 30 | 60
    interpolation: false,
    highQualityPen: false,
    warpTimer: false,
    infiniteClones: false
  };

  const sb3Projects = []; // { name, buffer }
  const userLinks   = []; // { label, url }

  function getSettingsItems(){
    const items = [
      {
        kind: 'toggle', key: 'instantLaunch',
        icon: settingsState.instantLaunch ? ICONS.toggleOn : ICONS.toggleOff,
        label: `Instant Launch: ${settingsState.instantLaunch ? 'On' : 'Off'}`
      },
      // Theme toggle TEMPORARILY REMOVED to troubleshoot bg.mp4 visibility.
      // applyTheme() still runs at startup so base colors/fonts are set —
      // this just removes the visitor-facing light/dark switch.
      {
        kind: 'cyclebg',
        icon: ICONS.bgIcon,
        label: `Background: ${backgroundModeLabel()}`
      },
      {
        kind: 'uploadBgImage',
        icon: ICONS.upload,
        label: 'Upload Background Image (PNG/JPG)…'
      },
      {
        kind: 'uploadBgAnim',
        icon: ICONS.upload,
        label: `Upload Animated Background (MP4/GIF, max ${MAX_ANIMATED_BG_SECONDS}s)…`
      }
    ];
    if (settingsState.background.imageData || settingsState.background.animData) {
      items.push({ kind: 'clearBg', icon: '🗑️', label: 'Clear Custom Background' });
    }
    if (MUSIC_TRACKS.length > 0) {
      items.push({
        kind: 'toggle', key: 'musicEnabled',
        icon: ICONS.musicIcon,
        label: `Music: ${settingsState.musicEnabled ? 'On' : 'Off'} (${MUSIC_TRACKS[settingsState.musicTrackIndex].label})`
      });
      if (MUSIC_TRACKS.length > 1) {
        items.push({ kind: 'cycletrack', icon: '⏭️', label: 'Next Music Track' });
      }
    }
    items.push(
      {
        kind: 'toggle', key: 'framerate',
        icon: settingsState.framerate === 60 ? ICONS.fast : ICONS.slow,
        label: `SB3 Framerate: ${settingsState.framerate} FPS`
      },
      {
        kind: 'toggle', key: 'interpolation',
        icon: settingsState.interpolation ? ICONS.toggleOn : ICONS.toggleOff,
        label: `SB3 Interpolation: ${settingsState.interpolation ? 'On' : 'Off'}`
      },
      {
        kind: 'toggle', key: 'highQualityPen',
        icon: settingsState.highQualityPen ? ICONS.toggleOn : ICONS.toggleOff,
        label: `SB3 High Quality Pen: ${settingsState.highQualityPen ? 'On' : 'Off'}`
      },
      {
        kind: 'toggle', key: 'warpTimer',
        icon: settingsState.warpTimer ? ICONS.toggleOn : ICONS.toggleOff,
        label: `SB3 Warp Timer: ${settingsState.warpTimer ? 'On' : 'Off'}`
      },
      {
        kind: 'toggle', key: 'infiniteClones',
        icon: settingsState.infiniteClones ? ICONS.toggleOn : ICONS.toggleOff,
        label: `SB3 Infinite Clones: ${settingsState.infiniteClones ? 'On' : 'Off'}`
      }
    );
    return items;
  }

  // Human-readable label for the current background mode, shown in Settings.
  function backgroundModeLabel(){
    const bg = settingsState.background;
    if (bg.mode === 'image' && bg.imageData) return 'Custom Image';
    if (bg.mode === 'animated' && bg.animData) return `Custom Animated (${bg.animMime === 'image/gif' ? 'GIF' : 'MP4'})`;
    return 'Default (bg.mp4)';
  }

  // Cycles through whichever background modes currently have data: Default
  // is always available; Image/Animated only appear once something has
  // been uploaded via Settings.
  function cycleBackgroundMode(){
    const bg = settingsState.background;
    const available = ['default'];
    if (bg.imageData) available.push('image');
    if (bg.animData) available.push('animated');
    const idx = available.indexOf(bg.mode);
    const nextIdx = (idx === -1 ? 0 : idx + 1) % available.length;
    bg.mode = available[nextIdx];
    applyBackground();
  }

  function getSb3Items(){
    const items = [{ kind: 'upload', icon: ICONS.upload, label: 'Upload SB3 File…' }];
    sb3Projects.forEach((p, i) => items.push({ kind: 'sb3project', icon: ICONS.sb3Project, label: p.name, index: i }));
    return items;
  }

  function getLinkItems(){
    const items = [{ kind: 'addlink', icon: ICONS.addLink, label: 'Add Link…' }];
    userLinks.forEach((l, i) => {
      const icon = l.url.includes('turbowarp.org') ? ICONS.linkTurbowarp : ICONS.linkScratch;
      items.push({ kind: 'link', icon, label: l.label, url: l.url, index: i });
    });
    return items;
  }

  const CATEGORIES = [
    { id: 'settings', label: 'Settings', icon: ICONS.category.settings, color: '#8f7dfb', getItems: getSettingsItems },
    { id: 'sb3',      label: 'SB3',      icon: ICONS.category.sb3,      color: '#f4a81d', getItems: getSb3Items },
    { id: 'link',     label: 'Link',     icon: ICONS.category.link,     color: '#28d1a1', getItems: getLinkItems }
  ];

  // ---- PERSISTENCE ------------------------------------------------------------
  // Settings, links, and uploaded SB3 projects are saved to localStorage so
  // they survive a page reload once hosted for real (this is sandboxed
  // inside the Claude.ai preview, so saves/loads may silently no-op there).
  const STORAGE_KEY = 'crossmeowdiabar-state-v1';

  function arrayBufferToBase64(buffer){
    let binary = '';
    const bytes = new Uint8Array(buffer);
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }
  function base64ToArrayBuffer(base64){
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
  }

  function saveState(){
    try {
      const data = {
        settings: settingsState,
        links: userLinks,
        sb3: sb3Projects.map(p => ({ name: p.name, base64: arrayBufferToBase64(p.buffer) }))
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (err) {
      // Storage can be unavailable (Claude.ai preview) or full (large SB3
      // uploads) — either way, fail quietly and keep running in-memory.
      console.warn('CrossMeowdiabar: could not save state', err);
    }
  }

  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.settings) Object.assign(settingsState, data.settings);
      if (Array.isArray(data.links)) userLinks.push(...data.links);
      if (Array.isArray(data.sb3)) {
        data.sb3.forEach(p => sb3Projects.push({ name: p.name, buffer: base64ToArrayBuffer(p.base64) }));
      }
    } catch (err) {
      console.warn('CrossMeowdiabar: could not load saved state', err);
    }
  }

/* ========================================================================
   3) ENGINE — navigation, sounds, the SB3 runtime, and the add-link
      modal. You shouldn't need to edit this to reskin or reconfigure the
      launcher.
   ======================================================================== */
  const root         = document.documentElement;
  const catRowEl      = document.getElementById('categoryRow');
  const itemListEl    = document.getElementById('itemList');
  const clockEl       = document.getElementById('clock');
  const launchFlashEl = document.getElementById('launchFlash');
  document.getElementById('siteTitle').textContent = SITE_TITLE;
  document.title = SITE_TITLE;

  let catIndex = 0;
  const itemIndices = CATEGORIES.map(() => 0);

  // ---- theming -----------------------------------------------------------
  function hexToRgba(hex, alpha){
    const h = hex.replace('#', '');
    const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
    const n = parseInt(full, 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  function applyTheme(){
    const theme = THEMES.find(t => t.id === settingsState.theme) || THEMES[0];
    root.style.setProperty('--bg-deep', theme.bgDeep);
    root.style.setProperty('--bg-mid', theme.bgMid);
    root.style.setProperty('--ink', theme.ink);
    root.style.setProperty('--ink-dim', theme.inkDim);
    root.style.setProperty('--panel', theme.panel);
  }

  // ---- background media (video / image) -------------------------------------
  const bgVideoEl = document.getElementById('bgVideo');
  const bgImageEl = document.getElementById('bgImage');
  bgVideoEl.addEventListener('error', () => {
    console.warn('CrossMeowdiabar: background video failed to load —', bgVideoEl.src, bgVideoEl.error);
  });
  bgImageEl.addEventListener('error', () => {
    console.warn('CrossMeowdiabar: background image failed to load —', bgImageEl.src);
  });

  function applyBackground(){
    const bg = settingsState.background;
    bgVideoEl.pause();
    bgVideoEl.style.display = 'none';
    bgImageEl.style.display = 'none';

    if (bg.mode === 'image' && bg.imageData) {
      bgImageEl.src = bg.imageData;
      bgImageEl.style.display = 'block';
    } else if (bg.mode === 'animated' && bg.animData) {
      if (bg.animMime === 'image/gif') {
        bgImageEl.src = bg.animData;
        bgImageEl.style.display = 'block';
      } else {
        bgVideoEl.src = bg.animData;
        bgVideoEl.style.display = 'block';
        bgVideoEl.play().catch(() => {}); // browsers may block autoplay until a user gesture
      }
    } else {
      bgVideoEl.src = DEFAULT_BG_VIDEO;
      bgVideoEl.style.display = 'block';
      bgVideoEl.play().catch(() => {});
    }
  }

  // ---- background music ----------------------------------------------------
  const bgMusicEl = document.getElementById('bgMusic');
  bgMusicEl.addEventListener('error', () => {
    console.warn('CrossMeowdiabar: music track failed to load —', bgMusicEl.src, bgMusicEl.error);
  });
  function applyMusic(){
    if (MUSIC_TRACKS.length === 0) return;
    const track = MUSIC_TRACKS[settingsState.musicTrackIndex] || MUSIC_TRACKS[0];
    if (settingsState.musicEnabled) {
      if (bgMusicEl.src !== track.url) bgMusicEl.src = track.url;
      bgMusicEl.play().catch((err) => console.warn('CrossMeowdiabar: music autoplay blocked, will retry on first interaction —', err));
    } else {
      bgMusicEl.pause();
    }
  }

  // ---- sound feedback (Web Audio, no external files needed) -------------
  let audioCtx = null;
  function ensureAudio(){
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTone(freq, duration, glide){
    const ctx = ensureAudio();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (glide) osc.frequency.exponentialRampToValueAtTime(glide, ctx.currentTime + duration);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  }
  // useRight: true plays ScrollR.mp3, false plays ScrollL.mp3.
  // Mapping: category-right & item-up -> ScrollR · category-left & item-down -> ScrollL
  function playScrollSound(useRight){
    const url = useRight ? UI_SOUNDS.scrollRight : UI_SOUNDS.scrollLeft;
    const fallbackFreq = useRight ? 560 : 480;
    playUiSound(url, () => playTone(fallbackFreq, 0.07));
  }
  function playSelectSound(){ playUiSound(UI_SOUNDS.select, () => playTone(660, 0.09, 990)); }
  function playUiSound(url, fallback){
    if (url) {
      const a = new Audio(url);
      a.volume = 0.6;
      a.play().catch((err) => {
        console.warn('CrossMeowdiabar: sound file failed to play, using fallback tone —', url, err);
        fallback();
      });
    } else {
      fallback();
    }
  }

  // ---- launch animation ---------------------------------------------------
  // instantLaunch OFF: bounce the highlighted item, then fade the screen,
  // then launch. instantLaunch ON: launch immediately, no animation.
  // This only ever runs from an explicit select (click/Enter) — never from
  // plain highlight navigation.
  function withLaunchAnimation(fn){
    if (settingsState.instantLaunch) { fn(); return; }
    const activeEl = itemListEl.children[itemIndices[catIndex]];
    if (activeEl) activeEl.classList.add('launch-bounce');
    launchFlashEl.classList.add('active');
    setTimeout(() => {
      if (activeEl) activeEl.classList.remove('launch-bounce');
      fn();
      setTimeout(() => launchFlashEl.classList.remove('active'), 160);
    }, 180);
  }

  // ---- category / item rendering -----------------------------------------
  function buildCategories(){
    catRowEl.innerHTML = '';
    CATEGORIES.forEach((cat, i) => {
      const el = document.createElement('div');
      el.className = 'category';
      el.tabIndex = 0;
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', cat.label);
      el.innerHTML = `<div class="icon">${cat.icon}</div><div class="label">${cat.label}</div>`;
      el.addEventListener('click', () => { const dir = i - catIndex; catIndex = i; playScrollSound(dir >= 0); render(); });
      catRowEl.appendChild(el);
    });
  }

  function currentItems(){
    return CATEGORIES[catIndex].getItems();
  }

  function buildItems(){
    itemListEl.innerHTML = '';
    const items = currentItems();
    if (itemIndices[catIndex] > items.length - 1) itemIndices[catIndex] = Math.max(0, items.length - 1);

    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'item-empty';
      empty.textContent = 'Nothing here yet.';
      itemListEl.appendChild(empty);
      return;
    }

    items.forEach((item, i) => {
      const isLink = item.kind === 'link';
      const el = document.createElement(isLink ? 'a' : 'button');
      el.className = 'item';
      el.type = isLink ? undefined : 'button';
      if (isLink) {
        el.href = item.url;
        el.target = '_blank';
        el.rel = 'noopener noreferrer';
      }
      el.innerHTML = `<span class="item-icon">${item.icon || '&#9654;'}</span><span class="item-label">${item.label}</span>`;
      el.addEventListener('click', (e) => {
        if (isLink) e.preventDefault(); // we open it ourselves so the launch animation can run first
        itemIndices[catIndex] = i;
        activateItem(item);
      });
      itemListEl.appendChild(el);
    });
  }

  function centerActiveCategory(){
    const active = catRowEl.children[catIndex];
    if (!active) return;
    const offset = -(active.offsetLeft + active.offsetWidth / 2) + (catRowEl.parentElement.clientWidth / 2);
    catRowEl.style.transform = `translateX(${offset}px)`;
  }

  function render(){
    const cat = CATEGORIES[catIndex];
    root.style.setProperty('--category-color', cat.color);
    root.style.setProperty('--category-glow', hexToRgba(cat.color, 0.6));
    root.style.setProperty('--category-wave', hexToRgba(cat.color, 0.35));

    [...catRowEl.children].forEach((el, i) => el.classList.toggle('active', i === catIndex));
    centerActiveCategory();

    buildItems();
    [...itemListEl.children].forEach((el, i) => el.classList.toggle('active', i === itemIndices[catIndex]));
    scrollActiveItemIntoView();
  }

  // Keeps the highlighted item visible as the pointer moves — matters most
  // in Settings, where the list is often taller than the visible area.
  function scrollActiveItemIntoView(){
    const active = itemListEl.children[itemIndices[catIndex]];
    if (!active) return;
    active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // ---- navigation ----------------------------------------------------------
  function moveCategory(delta){
    catIndex = (catIndex + delta + CATEGORIES.length) % CATEGORIES.length;
    playScrollSound(delta > 0); // right -> ScrollR, left -> ScrollL
    render();
  }
  function moveItem(delta){
    const len = currentItems().length;
    if (len === 0) return;
    itemIndices[catIndex] = (itemIndices[catIndex] + delta + len) % len;
    playScrollSound(delta < 0); // up -> ScrollR, down -> ScrollL
    render();
    // Note: navigation only moves the highlight. Launching only ever
    // happens on an explicit select (Enter / click) via launchActive() /
    // activateItem() — see withLaunchAnimation() for what Instant Launch
    // actually changes about that.
  }

  // ---- activating an item: dispatches by kind ------------------------------
  function activateItem(item){
    switch (item.kind) {
      case 'toggle':
        playSelectSound();
        if (item.key === 'theme') {
          const idx = THEMES.findIndex(t => t.id === settingsState.theme);
          settingsState.theme = THEMES[(idx + 1) % THEMES.length].id;
          applyTheme();
        } else if (item.key === 'framerate') {
          settingsState.framerate = settingsState.framerate === 60 ? 30 : 60;
          applyRuntimeSettings();
        } else if (item.key === 'musicEnabled') {
          settingsState.musicEnabled = !settingsState.musicEnabled;
          applyMusic();
        } else {
          settingsState[item.key] = !settingsState[item.key];
          applyRuntimeSettings();
        }
        saveState();
        render();
        break;
      case 'cycletrack':
        playSelectSound();
        settingsState.musicTrackIndex = (settingsState.musicTrackIndex + 1) % MUSIC_TRACKS.length;
        applyMusic();
        saveState();
        render();
        break;
      case 'cyclebg':
        playSelectSound();
        cycleBackgroundMode();
        saveState();
        render();
        break;
      case 'uploadBgImage':
        playSelectSound();
        document.getElementById('bgImageInput').click();
        break;
      case 'uploadBgAnim':
        playSelectSound();
        document.getElementById('bgAnimInput').click();
        break;
      case 'clearBg':
        playSelectSound();
        settingsState.background.mode = 'default';
        settingsState.background.imageData = null;
        settingsState.background.animData = null;
        settingsState.background.animMime = null;
        applyBackground();
        saveState();
        render();
        break;
      case 'upload':
        playSelectSound();
        document.getElementById('sb3FileInput').click();
        break;
      case 'addlink':
        playSelectSound();
        openAddLinkPanel();
        break;
      case 'link':
        playSelectSound();
        withLaunchAnimation(() => window.open(item.url, '_blank', 'noopener,noreferrer'));
        break;
      case 'sb3project':
        playSelectSound();
        withLaunchAnimation(() => runSb3Project(sb3Projects[item.index]));
        break;
    }
  }

  function launchActive(){
    const items = currentItems();
    const item = items[itemIndices[catIndex]];
    if (item) activateItem(item);
  }

  function isModalOpen(){
    return document.getElementById('playerBackdrop').classList.contains('open')
        || document.getElementById('addLinkBackdrop').classList.contains('open');
  }

  document.addEventListener('keydown', (e) => {
    if (isModalOpen()) {
      // Let keyboard input reach the running SB3 project / the add-link
      // input instead of moving the launcher underneath it. Escape still
      // closes whichever panel is open.
      if (e.key === 'Escape') {
        const player = document.getElementById('playerBackdrop');
        const addLink = document.getElementById('addLinkBackdrop');
        if (player.classList.contains('open')) document.getElementById('playerClose').click();
        if (addLink.classList.contains('open')) closeAddLinkPanel();
      }
      return;
    }
    ensureAudio();
    switch (e.key){
      case 'ArrowLeft':  e.preventDefault(); moveCategory(-1); break;
      case 'ArrowRight': e.preventDefault(); moveCategory(1);  break;
      case 'ArrowUp':    e.preventDefault(); moveItem(-1);     break;
      case 'ArrowDown':  e.preventDefault(); moveItem(1);      break;
      case 'Enter':      e.preventDefault(); launchActive();   break;
    }
  });
  document.addEventListener('click', ensureAudio, { once: true });
  // Most browsers block autoplay of unmuted <audio> until the visitor has
  // interacted with the page at least once — retry starting music then.
  document.addEventListener('click', () => {
    if (settingsState.musicEnabled && bgMusicEl.paused) bgMusicEl.play().catch(() => {});
  }, { once: true });
  document.addEventListener('keydown', () => {
    if (settingsState.musicEnabled && bgMusicEl.paused) bgMusicEl.play().catch(() => {});
  }, { once: true });

  function updateClock(){
    clockEl.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 10000);
  window.addEventListener('resize', centerActiveCategory);

  // ---- SB3 upload ------------------------------------------------------------
  const sb3FileInput = document.getElementById('sb3FileInput');
  sb3FileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      sb3Projects.push({ name: file.name.replace(/\.sb3$/i, ''), buffer: reader.result });
      itemIndices[catIndex] = currentItems().length - 1; // jump to the newly added project
      saveState();
      render();
    };
    reader.readAsArrayBuffer(file);
    sb3FileInput.value = ''; // allow re-uploading the same filename later
  });

  // ---- background: static image upload (png/jpg) -----------------------------
  const bgImageInput = document.getElementById('bgImageInput');
  bgImageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!/^image\/(png|jpeg)$/.test(file.type)) {
      alert('Please choose a PNG or JPG image.');
      bgImageInput.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      settingsState.background.imageData = reader.result; // data URL, persisted via saveState
      settingsState.background.mode = 'image';
      applyBackground();
      saveState();
      render();
    };
    reader.onerror = () => alert('Could not read that image file.');
    reader.readAsDataURL(file);
    bgImageInput.value = ''; // allow re-uploading the same filename later
  });

  // ---- background: animated upload (mp4/gif, mp4 capped at 30s) --------------
  const bgAnimInput = document.getElementById('bgAnimInput');
  bgAnimInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const isMp4 = file.type === 'video/mp4' || /\.mp4$/i.test(file.name);
    const isGif = file.type === 'image/gif' || /\.gif$/i.test(file.name);
    if (!isMp4 && !isGif) {
      alert('Please choose an MP4 video or a GIF image.');
      bgAnimInput.value = '';
      return;
    }

    const finishUpload = () => {
      const reader = new FileReader();
      reader.onload = () => {
        settingsState.background.animData = reader.result; // data URL, persisted via saveState
        settingsState.background.animMime = isGif ? 'image/gif' : 'video/mp4';
        settingsState.background.mode = 'animated';
        applyBackground();
        saveState();
        render();
      };
      reader.onerror = () => alert('Could not read that file.');
      reader.readAsDataURL(file);
      bgAnimInput.value = '';
    };

    if (isMp4) {
      // Probe the video's duration before accepting it — mp4 backgrounds
      // are capped at MAX_ANIMATED_BG_SECONDS. (GIF duration can't be
      // reliably read in-browser without a parsing library, so gifs skip
      // this check — keep them short so they loop cleanly.)
      const tempUrl = URL.createObjectURL(file);
      const probe = document.createElement('video');
      probe.preload = 'metadata';
      probe.onloadedmetadata = () => {
        URL.revokeObjectURL(tempUrl);
        if (probe.duration > MAX_ANIMATED_BG_SECONDS) {
          alert(`That video is about ${Math.round(probe.duration)}s long — animated backgrounds must be ${MAX_ANIMATED_BG_SECONDS} seconds or shorter.`);
          bgAnimInput.value = '';
          return;
        }
        finishUpload();
      };
      probe.onerror = () => {
        URL.revokeObjectURL(tempUrl);
        alert('Could not read that video file.');
        bgAnimInput.value = '';
      };
      probe.src = tempUrl;
    } else {
      finishUpload();
    }
  });

  // ---- SB3 runtime (@turbowarp/scaffolding) ----------------------------------
  let scaffolding = null;
  const playerBackdrop = document.getElementById('playerBackdrop');
  const playerShellEl  = document.getElementById('playerShell');
  const playerTitleEl  = document.getElementById('playerTitle');
  const playerStatusEl = document.getElementById('playerStatus');

  function ensureScaffolding(){
    if (scaffolding) return scaffolding;
    scaffolding = new window.Scaffolding.Scaffolding();
    scaffolding.width = 480;
    scaffolding.height = 360;
    scaffolding.resizeMode = 'preserve-ratio';
    scaffolding.setup();
    scaffolding.appendTo(document.getElementById('playerStage'));
    applyRuntimeSettings();
    return scaffolding;
  }

  // Pushes the Settings-category toggles (framerate, interpolation, high
  // quality pen, warp timer, infinite clones) onto the live VM. Safe to call
  // any time — it no-ops if no project is loaded yet.
  function applyRuntimeSettings(){
    if (!scaffolding || !scaffolding.vm) return;
    const vm = scaffolding.vm;
    if (vm.setFramerate) vm.setFramerate(settingsState.framerate);
    if (vm.setInterpolation) vm.setInterpolation(settingsState.interpolation);
    if (vm.renderer && vm.renderer.setUseHighQualityRender) vm.renderer.setUseHighQualityRender(settingsState.highQualityPen);
    if (vm.setRuntimeOptions) vm.setRuntimeOptions({ maxClones: settingsState.infiniteClones ? Infinity : 300 });
    if (vm.setCompilerOptions) vm.setCompilerOptions({ warpTimer: settingsState.warpTimer });
  }

  async function runSb3Project(project){
    if (!project) return;
    if (!window.Scaffolding) {
      playerStatusEl.textContent = 'Runtime failed to load — check your internet connection.';
      playerBackdrop.classList.add('open');
      return;
    }
    playerTitleEl.textContent = project.name;
    playerStatusEl.textContent = 'Loading…';
    playerBackdrop.classList.add('open');
    const s = ensureScaffolding();
    applyRuntimeSettings();
    try {
      // loadProject wants a fresh copy each run since the buffer gets detached
      await s.loadProject(project.buffer.slice(0));
      s.greenFlag();
      playerStatusEl.textContent = `Running “${project.name}” — ▶ restarts, ■ stops.`;
    } catch (err) {
      console.error(err);
      playerStatusEl.textContent = 'Could not load this project — is it a valid .sb3 file?';
    }
  }

  document.getElementById('playerGreenFlag').addEventListener('click', () => { if (scaffolding) scaffolding.greenFlag(); });
  document.getElementById('playerStop').addEventListener('click', () => { if (scaffolding) scaffolding.vm.stopAll(); });
  document.getElementById('playerClose').addEventListener('click', () => {
    if (scaffolding) scaffolding.vm.stopAll();
    if (document.fullscreenElement) document.exitFullscreen();
    playerBackdrop.classList.remove('open');
  });

  // ---- fullscreen SB3 player -------------------------------------------------
  document.getElementById('playerFullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      (playerShellEl.requestFullscreen || playerShellEl.webkitRequestFullscreen)?.call(playerShellEl);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
    }
  });
  document.addEventListener('fullscreenchange', () => {
    // Give the CSS a moment to apply the fullscreen sizing before telling
    // Scaffolding to recalculate the stage size.
    setTimeout(() => { if (scaffolding) scaffolding.relayout(); }, 50);
  });

  // ---- add-link modal ---------------------------------------------------------
  const addLinkBackdrop = document.getElementById('addLinkBackdrop');
  const addLinkInput    = document.getElementById('addLinkInput');
  const addLinkError    = document.getElementById('addLinkError');

  function openAddLinkPanel(){
    addLinkInput.value = '';
    addLinkError.textContent = '';
    addLinkBackdrop.classList.add('open');
    setTimeout(() => addLinkInput.focus(), 50);
  }
  function closeAddLinkPanel(){
    addLinkBackdrop.classList.remove('open');
  }
  function confirmAddLink(){
    const raw = addLinkInput.value.trim();
    let url;
    try {
      url = new URL(raw);
    } catch {
      addLinkError.textContent = 'That doesn\u2019t look like a valid URL.';
      return;
    }
    if (!/scratch\.mit\.edu|turbowarp\.org/i.test(url.hostname)) {
      addLinkError.textContent = 'Only scratch.mit.edu or turbowarp.org links are supported.';
      return;
    }
    const label = url.hostname.includes('turbowarp') ? `TurboWarp: ${url.pathname.replace(/\/$/, '')}` : `Scratch: ${url.pathname.replace(/\/$/, '')}`;
    userLinks.push({ label, url: url.href });
    closeAddLinkPanel();
    playSelectSound();
    saveState();
    itemIndices[catIndex] = currentItems().length - 1;
    render();
  }
  document.getElementById('addLinkConfirm').addEventListener('click', confirmAddLink);
  document.getElementById('addLinkCancel').addEventListener('click', closeAddLinkPanel);
  addLinkInput.addEventListener('keydown', (e) => {
    e.stopPropagation(); // don't let the launcher's arrow-key nav fire while typing
    if (e.key === 'Enter') confirmAddLink();
    if (e.key === 'Escape') closeAddLinkPanel();
  });
  addLinkBackdrop.addEventListener('click', (e) => { if (e.target === addLinkBackdrop) closeAddLinkPanel(); });
  playerBackdrop.addEventListener('click', (e) => {
    if (e.target === playerBackdrop) {
      if (scaffolding) scaffolding.vm.stopAll();
      if (document.fullscreenElement) document.exitFullscreen();
      playerBackdrop.classList.remove('open');
    }
  });

  loadState();
  applyTheme();
  applyMusic();
  applyBackground();
  buildCategories();
  render();
</script>
</body>
</html>
